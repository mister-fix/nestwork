name: Check Stale Last Reviewed Files

on: [push, pull_request]

jobs:
  review-check:
    name: Check for stale last-reviewed files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run stale file checker
        run: node .github/scripts/check-stale-reviews.js

      - name: Create GitHub Issue
        if: env.STALE_FILES_FOUND == 'true'
        uses: peter-evans/create-issue-from-file@v4
        with:
          title: "🔍 Review stale files (>6 months old)"
          content-filepath: .github/stale-files-report.md
          labels: maintenance, automation

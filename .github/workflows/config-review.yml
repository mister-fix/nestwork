name: Config File Review

on: [push, pull_request]

jobs:
  track-configs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Identify config files
        id: config-finder
        run: |
          # Create array of files properly
          mapfile -t FILES_ARRAY < <(find . -type f \( \
            -name "*.config.*" -o \
            -name "tsconfig*.json" -o \
            -name ".eslint*" -o \
            -name ".prettier*" -o \
            -name "package.json" -o \
            -name "turbo.json" -o \
            -name ".npmrc" -o \
            -name ".nvmrc" -o \
            -name ".git*" -o \
            -path "./.github/*.yml" -o \
            -path "./.vscode/*.json" \) \
            -not -path "*/node_modules/*" \
            -not -path "*/dist/*" \
            -not -path "./.git/*" \
            -not -path "*/.turbo/*" \
            -not -path "*/.next/*" \
            | sed 's|^\./||' | sort)

          # Convert to JSON safely
          JSON_FILES=$(printf '%s\n' "${FILES_ARRAY[@]}" | jq -R . | jq -s .)
          echo "files=$JSON_FILES" >> $GITHUB_OUTPUT

      - name: Create Maintenance Issue
        if: ${{ fromJson(steps.config-finder.outputs.files) != [] }}
        uses: actions/github-script@v6
        with:
          script: |
            const files = ${{ steps.config-finder.outputs.files }};
            const timestamp = new Date().toISOString().split('T')[0];

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Maintenance] Configuration File Review (${timestamp})`,
              body: `The following ${files.length} configuration files need review:\n\n` +
                    files.map(f => `- [ ] \`${f}\``).join('\n') +
                    `\n\n**Review Checklist:**\n` +
                    `1. Verify settings are still relevant\n` +
                    `2. Check for deprecated options\n` +
                    `3. Compare with latest tool recommendations`,
              labels: ['maintenance', 'automation']
            });

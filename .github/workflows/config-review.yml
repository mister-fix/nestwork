name: Check stale config files

on: [push, pull_request]

jobs:
  check-stale-configs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: List stale config files
        id: stale
        run: |
          echo "Checking for config files not modified in the last 1 day..."

          ONE_DAY_AGO=$(date -d '1 day ago' +%s)

          FILE_PATTERNS=(
            "**/tsconfig.json"
            "**/package.json"
            "**/eslint.config.*"
            "**/.prettierrc.*"
            "**/cspell.json"
            "**/.editorconfig"
            "**/commitlint.config.*"
            "**/turbo.json"
            "**/postcss.config.*"
            "**/next.config.*"
            "**/eslint-config/*.*js"
            "**/tailwind.config.*"
            ".github/labels.json"
            ".github/**/*.yml"
          )

          STALE_FILES=()

          for pattern in "${FILE_PATTERNS[@]}"; do
            for file in $(find . -path "./node_modules" -prune -o -type f -name "${pattern##*/}" -print); do
              echo "Checking file: $file"
              LAST_COMMIT_DATE=$(git log -1 --format="%ct" -- "$file")
              if [[ $LAST_COMMIT_DATE -lt $ONE_DAY_AGO ]]; then
                STALE_FILES+=("$file")
              fi
            done
          done

          if [[ ${#STALE_FILES[@]} -eq 0 ]]; then
            echo "No stale config files found."
            echo "stale=0" >> $GITHUB_OUTPUT
          else
            echo "Found ${#STALE_FILES[@]} stale config files:"
            printf '%s\n' "${STALE_FILES[@]}"

            # Properly format the output
            FILE_LIST=$(printf '%s\n' "${STALE_FILES[@]}")
            echo "stale=1" >> $GITHUB_OUTPUT
            echo "files<<EOF" >> $GITHUB_OUTPUT
            echo "$FILE_LIST" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create or update issue
        if: steps.stale.outputs.stale == '1'
        uses: actions/github-script@v7
        env:
          FILE_LIST: ${{ steps.stale.outputs.files }}
        with:
          script: |
            const fileList = process.env.FILE_LIST.split('\n').filter(Boolean);

            const issueTitle = "🔍 Review stale config files";
            const formattedFiles = fileList.map(f => `- ${f}`).join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'maintenance',
            });

            const existing = issues.find(issue => issue.title === issueTitle);

            const body = `
              ## Stale Configuration Files
              The following config files have not been modified in over 6 months and may require review:

              ${formattedFiles}

              **Review Checklist:**
              1. Verify all settings are still relevant
              2. Check for deprecated options
              3. Compare with latest tool recommendations

              _Last checked: ${new Date().toISOString()}_
            `;

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body,
                labels: ['maintenance']
              });
            }

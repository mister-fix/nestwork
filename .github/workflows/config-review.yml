name: Config File Review

on: [push, pull_request]

jobs:
  track-configs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Identify config files
        id: config-finder
        run: |
          # Find files and remove './' prefix
          CONFIG_FILES=$(find . -type f \( \
            -name "*.config.*" -o \
            -name "tsconfig*.json" -o \
            -name ".eslint*" -o \
            -name ".prettier*" -o \
            -name "package.json" -o \
            -name "turbo.json" -o \
            -name ".npmrc" -o \
            -name ".nvmrc" -o \
            -name ".git*" -o \
            -path "./.github/*.yml" -o \
            -path "./.vscode/*.json" \) \
            -not -path "*/node_modules/*" \
            -not -path "*/dist/*" \
            | sed 's|^\./||')

          # Format as JSON array to handle spaces/special chars
          JSON_FILES=$(jq -n --arg files "$CONFIG_FILES" '$files | split("\n")')
          echo "files=$JSON_FILES" >> $GITHUB_OUTPUT

      - name: Create Maintenance Issue
        uses: actions/github-script@v6
        if: ${{ steps.config-finder.outputs.files != '[""]' }}
        with:
          script: |
            const files = JSON.parse(`${{ steps.config-finder.outputs.files }}`);
            const timestamp = new Date().toISOString().split('T')[0];

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Maintenance] Configuration File Review (${timestamp})`,
              body: `The following ${files.length} configuration files need review:\n\n` +
                    files.map(f => `- [ ] \`${f}\``).join('\n') +
                    `\n\n**Review Checklist:**\n` +
                    `1. Verify settings are still relevant\n` +
                    `2. Check for deprecated options\n` +
                    `3. Compare with latest tool recommendations`,
              labels: ['maintenance', 'automation']
            });
